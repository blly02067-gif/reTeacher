<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow — Progress</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  .streak-hero {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 32px;
    text-align: center; margin-bottom: 24px;
  }
  .streak-fire { font-size: 52px; margin-bottom: 8px; }
  .streak-num { font-size: 56px; font-weight: 800; color: var(--accent2); letter-spacing: -2px; line-height: 1; }
  .streak-lbl { font-size: 16px; color: var(--text2); margin-top: 4px; margin-bottom: 20px; }
  .week-row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
  .week-day { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .week-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .week-dot.done { background: var(--accent-bg); color: var(--accent2); border: 1.5px solid var(--accent); }
  .week-dot.today { background: var(--accent); color: #fff; }
  .week-dot.empty { background: var(--bg3); color: var(--text3); }
  .week-day-lbl { font-size: 11px; color: var(--text2); }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .manual-section { margin-bottom: 24px; }
  .log-session-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .cal-day.has-session { background: var(--accent-bg); color: var(--accent2); }
  .cal-day.today-cal { background: var(--accent); color: #fff; }
  .cal-day.empty-cal { background: var(--bg3); color: var(--text3); }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-header span { text-align: center; font-size: 11px; color: var(--text2); font-weight: 600; }
  .achievement { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg3); border-radius: var(--radius); margin-bottom: 6px; }
  .ach-icon { font-size: 24px; flex-shrink: 0; }
  .ach-name { font-size: 14px; font-weight: 600; }
  .ach-desc { font-size: 12px; color: var(--text2); }
  .ach-locked { opacity: 0.35; filter: grayscale(1); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">StudyFlow</a>
  <a href="app.html" class="nav-link">Dashboard</a>
  <a href="timer.html" class="nav-link">⏱ Timer</a>
  <a href="flashcards.html" class="nav-link">🃏 Flashcards</a>
  <a href="todos.html" class="nav-link">✅ Todos</a>
  <a href="subjects.html" class="nav-link">📁 Subjects</a>
  <a href="progress.html" class="nav-link active">🔥 Progress</a>
  <div class="nav-spacer"></div>
  <a href="reteacher.html" class="nav-premium">✨ ReTeacher</a>
</nav>

<div class="page">
  <h1 class="page-title">Progress</h1>
  <p class="page-sub">Your study habit, visualized.</p>

  <div class="streak-hero">
    <div class="streak-fire" id="streak-emoji">🔥</div>
    <div class="streak-num" id="streak-big">0</div>
    <div class="streak-lbl">day streak</div>
    <div class="week-row" id="week-row"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-sessions">0</div><div class="stat-label">total sessions</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-tasks">0</div><div class="stat-label">tasks done</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-cards">0</div><div class="stat-label">flashcards</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-hours">0</div><div class="stat-label">study hours</div></div>
  </div>

  <div class="card manual-section">
    <h2 style="font-size:15px;font-weight:700;margin-bottom:14px">Log a study session</h2>
    <div class="log-session-bar">
      <input type="number" id="hours-input" placeholder="Hours" min="0" max="12" style="width:100px">
      <input type="text" id="session-subj" placeholder="Subject (optional)" style="flex:1">
      <button class="btn btn-primary" id="log-btn">Log session</button>
      <button class="btn btn-ghost" id="log-pomodoro-btn">+ 1 Pomodoro (25 min)</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:24px">
    <h2 style="font-size:15px;font-weight:700;margin-bottom:16px">Study calendar — last 28 days</h2>
    <div class="cal-header">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="card">
    <h2 style="font-size:15px;font-weight:700;margin-bottom:14px">Achievements</h2>
    <div id="achievements"></div>
  </div>

  <div style="margin-top:16px;text-align:right">
    <button class="btn btn-danger btn-sm" id="reset-btn">Reset all progress</button>
  </div>
</div>

<script>
let progress = JSON.parse(localStorage.getItem('sf_progress') || '{"streak":0,"sessions":0,"hours":0,"days":[],"calendar":{}}');

function save() { localStorage.setItem('sf_progress', JSON.stringify(progress)); }

function render() {
  const s = progress.streak || 0;
  document.getElementById('streak-big').textContent = s;
  document.getElementById('streak-emoji').textContent = s >= 7 ? '🔥' : s >= 3 ? '✨' : '⭐';

  const todos = JSON.parse(localStorage.getItem('sf_todos') || '[]');
  const flashcards = JSON.parse(localStorage.getItem('sf_flashcards') || '[]');
  document.getElementById('stat-sessions').textContent = progress.sessions || 0;
  document.getElementById('stat-tasks').textContent = todos.filter(t => t.done).length;
  document.getElementById('stat-cards').textContent = flashcards.length;
  document.getElementById('stat-hours').textContent = Math.round((progress.hours || 0) * 10) / 10;

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const today = new Date().getDay();
  const studiedDays = progress.days || [];
  document.getElementById('week-row').innerHTML = days.map((d, i) => {
    const cls = i === today ? 'today' : studiedDays.includes(i) ? 'done' : 'empty';
    return `<div class="week-day"><div class="week-dot ${cls}">${d.slice(0,1)}</div><div class="week-day-lbl">${d}</div></div>`;
  }).join('');

  const cal = document.getElementById('cal-grid');
  const calData = progress.calendar || {};
  const todayStr = new Date().toISOString().split('T')[0];
  let calHTML = '';
  for (let i = 27; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const isToday = key === todayStr;
    const has = calData[key];
    const cls = isToday ? 'today-cal' : has ? 'has-session' : 'empty-cal';
    calHTML += `<div class="cal-day ${cls}" title="${key}">${d.getDate()}</div>`;
  }
  cal.innerHTML = calHTML;

  const achList = [
    { icon: '🌱', name: 'First session', desc: 'Complete your first study session', earned: (progress.sessions || 0) >= 1 },
    { icon: '🔥', name: '3-day streak', desc: 'Study 3 days in a row', earned: s >= 3 },
    { icon: '⚡', name: '7-day streak', desc: 'Study 7 days in a row', earned: s >= 7 },
    { icon: '📚', name: '10 sessions', desc: 'Complete 10 study sessions', earned: (progress.sessions || 0) >= 10 },
    { icon: '🃏', name: 'Card creator', desc: 'Add 10 flashcards', earned: flashcards.length >= 10 },
    { icon: '✅', name: 'Task master', desc: 'Complete 10 tasks', earned: todos.filter(t => t.done).length >= 10 },
    { icon: '🎯', name: 'Marathon', desc: 'Log 10 hours of study', earned: (progress.hours || 0) >= 10 },
    { icon: '🏆', name: '30-day streak', desc: 'Study 30 days in a row', earned: s >= 30 },
  ];
  document.getElementById('achievements').innerHTML = achList.map(a => `
    <div class="achievement ${a.earned ? '' : 'ach-locked'}">
      <div class="ach-icon">${a.icon}</div>
      <div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>
      ${a.earned ? '<span class="badge badge-green" style="margin-left:auto">Earned</span>' : ''}
    </div>
  `).join('');
}

function logSession(h) {
  progress.sessions = (progress.sessions || 0) + 1;
  progress.hours = (progress.hours || 0) + h;
  const day = new Date().getDay();
  if (!progress.days) progress.days = [];
  if (!progress.days.includes(day)) {
    progress.days.push(day);
    progress.streak = (progress.streak || 0) + 1;
  }
  const today = new Date().toISOString().split('T')[0];
  if (!progress.calendar) progress.calendar = {};
  progress.calendar[today] = true;
  save(); render();
}

document.getElementById('log-btn').addEventListener('click', () => {
  const h = parseFloat(document.getElementById('hours-input').value) || 0;
  if (h <= 0) return;
  logSession(h);
  document.getElementById('hours-input').value = '';
  document.getElementById('session-subj').value = '';
});

document.getElementById('log-pomodoro-btn').addEventListener('click', () => { logSession(25/60); });

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all progress? This cannot be undone.')) {
    progress = { streak: 0, sessions: 0, hours: 0, days: [], calendar: {} };
    save(); render();
  }
});

render();
</script>
</body>
</html>
