<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow — Subjects</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  .color-row { display: flex; gap: 6px; align-items: center; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }
  .color-dot.selected { border-color: #fff; transform: scale(1.1); }
  .subj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .subj-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px;
    transition: all 0.15s; cursor: pointer; position: relative; overflow: hidden;
  }
  .subj-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .subj-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .subj-name { font-size: 17px; font-weight: 700; }
  .subj-emoji { font-size: 26px; }
  .subj-stats { display: flex; gap: 16px; }
  .subj-stat { text-align: center; }
  .subj-stat-num { font-size: 20px; font-weight: 700; }
  .subj-stat-lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .subj-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.15s; padding: 4px 6px; border-radius: 6px; }
  .subj-card:hover .subj-delete { opacity: 1; }
  .subj-delete:hover { color: var(--red); background: var(--red-bg); }
  .emoji-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .emoji-opt { font-size: 20px; cursor: pointer; padding: 4px 6px; border-radius: 6px; border: 1px solid transparent; transition: all 0.1s; }
  .emoji-opt.selected, .emoji-opt:hover { background: var(--bg3); border-color: var(--border2); }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
</style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<nav>
  <a href="index.html" class="nav-logo">StudyFlow</a>
  <a href="app.html" class="nav-link">Dashboard</a>
  <a href="timer.html" class="nav-link">⏱ Timer</a>
  <a href="flashcards.html" class="nav-link">🃏 Flashcards</a>
  <a href="todos.html" class="nav-link">✅ Todos</a>
  <a href="subjects.html" class="nav-link active">📁 Subjects</a>
  <a href="progress.html" class="nav-link">🔥 Progress</a>
  <div class="nav-spacer"></div>
  <div id="sf-auth-slot"></div>
  <a href="reteacher.html" class="nav-premium">✨ ReTeacher</a>
</nav>

<div class="page">
  <h1 class="page-title">Subjects</h1>
  <p class="page-sub">Organize your classes and see all your activity per subject.</p>

  <div class="card" style="margin-bottom:24px">
    <p class="form-label" style="margin-bottom:10px">Add subject</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <input type="text" id="subj-name" placeholder="Subject name (e.g. Calculus)" style="flex:1;min-width:160px">
      <button class="btn btn-primary" id="add-subj-btn">+ Add subject</button>
    </div>
    <p class="form-label" style="margin-bottom:8px">Pick a color</p>
    <div class="color-row" id="color-row" style="margin-bottom:14px">
      <div class="color-dot selected" data-color="#7c6af7" style="background:#7c6af7"></div>
      <div class="color-dot" data-color="#3ecf8e" style="background:#3ecf8e"></div>
      <div class="color-dot" data-color="#f5a623" style="background:#f5a623"></div>
      <div class="color-dot" data-color="#f06060" style="background:#f06060"></div>
      <div class="color-dot" data-color="#60aff0" style="background:#60aff0"></div>
      <div class="color-dot" data-color="#d4537e" style="background:#d4537e"></div>
      <div class="color-dot" data-color="#5dcaa5" style="background:#5dcaa5"></div>
      <div class="color-dot" data-color="#888780" style="background:#888780"></div>
    </div>
    <p class="form-label" style="margin-bottom:8px">Pick an emoji</p>
    <div class="emoji-row" id="emoji-row">
      <span class="emoji-opt selected" data-emoji="📚">📚</span>
      <span class="emoji-opt" data-emoji="🔬">🔬</span>
      <span class="emoji-opt" data-emoji="🧮">🧮</span>
      <span class="emoji-opt" data-emoji="⚗️">⚗️</span>
      <span class="emoji-opt" data-emoji="🌍">🌍</span>
      <span class="emoji-opt" data-emoji="💻">💻</span>
      <span class="emoji-opt" data-emoji="📐">📐</span>
      <span class="emoji-opt" data-emoji="🎨">🎨</span>
      <span class="emoji-opt" data-emoji="🎵">🎵</span>
      <span class="emoji-opt" data-emoji="📖">📖</span>
      <span class="emoji-opt" data-emoji="🧬">🧬</span>
      <span class="emoji-opt" data-emoji="🏛️">🏛️</span>
    </div>
  </div>

  <div class="subj-grid" id="subj-grid">
    <div class="empty-state"><div style="font-size:32px">📁</div><p>No subjects yet.<br>Add your first one above.</p></div>
  </div>
</div>

<script>
let subjects = [];
let todos = [];
let flashcards = [];
let selColor = '#7c6af7';
let selEmoji = '📚';

async function initSubjects() {
  [subjects, todos, flashcards] = await Promise.all([
    sfLoad('subjects', []),
    sfLoad('todos', []),
    sfLoad('flashcards', [])
  ]);
  render();
}

async function saveSubjects() { await sfSave('subjects', subjects); }

function render() {
  const el = document.getElementById('subj-grid');
  if (!subjects.length) {
    el.innerHTML = '<div class="empty-state"><div style="font-size:32px">📁</div><p>No subjects yet.<br>Add your first one above.</p></div>';
    return;
  }
  el.innerHTML = subjects.map(s => {
    const taskCount = todos.filter(t => (t.subject || '').toLowerCase() === s.name.toLowerCase()).length;
    const cardCount = flashcards.filter(c => (c.deck || '').toLowerCase() === s.name.toLowerCase()).length;
    return `<div class="subj-card" style="border-left:4px solid ${s.color}">
      <button class="subj-delete" onclick="deleteSubj('${s.id}')">✕</button>
      <div class="subj-top">
        <div class="subj-name">${s.name}</div>
        <div class="subj-emoji">${s.emoji}</div>
      </div>
      <div class="subj-stats">
        <div class="subj-stat">
          <div class="subj-stat-num" style="color:${s.color}">${taskCount}</div>
          <div class="subj-stat-lbl">tasks</div>
        </div>
        <div class="subj-stat">
          <div class="subj-stat-num" style="color:${s.color}">${cardCount}</div>
          <div class="subj-stat-lbl">flashcards</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function deleteSubj(id) {
  subjects = subjects.filter(s => s.id !== id);
  await saveSubjects(); render();
}

document.getElementById('add-subj-btn').addEventListener('click', async () => {
  const name = document.getElementById('subj-name').value.trim();
  if (!name) return;
  subjects.push({ id: Date.now().toString(), name, color: selColor, emoji: selEmoji });
  await saveSubjects(); render();
  document.getElementById('subj-name').value = '';
});

document.getElementById('color-row').addEventListener('click', e => {
  const dot = e.target.closest('.color-dot');
  if (!dot) return;
  selColor = dot.dataset.color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('selected', d === dot));
});

document.getElementById('emoji-row').addEventListener('click', e => {
  const opt = e.target.closest('.emoji-opt');
  if (!opt) return;
  selEmoji = opt.dataset.emoji;
  document.querySelectorAll('.emoji-opt').forEach(d => d.classList.toggle('selected', d === opt));
});

sfOnAuthReady(() => initSubjects());
initSubjects();
</script>
</body>
</html>
