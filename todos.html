<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow — Homework Tracker</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  .add-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .add-bar input[type="text"] { flex: 1; min-width: 180px; }
  .add-bar input[type="date"] { width: 150px; }
  .add-bar select { width: 140px; }
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s; }
  .filter-btn.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent); }
  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 6px; transition: all 0.15s;
  }
  .todo-item:hover { border-color: var(--border2); }
  .todo-item.done { opacity: 0.45; }
  .todo-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
  .todo-text-wrap { flex: 1; }
  .todo-main { font-size: 15px; font-weight: 500; }
  .todo-item.done .todo-main { text-decoration: line-through; }
  .todo-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
  .todo-subj { font-size: 12px; color: var(--text2); }
  .due-badge { font-size: 12px; padding: 2px 8px; border-radius: 6px; }
  .due-ok { background: var(--green-bg); color: var(--green); }
  .due-soon { background: var(--amber-bg); color: var(--amber); }
  .due-late { background: var(--red-bg); color: var(--red); }
  .prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .prio-high { background: var(--red); }
  .prio-med { background: var(--amber); }
  .prio-low { background: var(--green); }
  .todo-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .todo-item:hover .todo-actions { opacity: 1; }
  .progress-bar-wrap { background: var(--bg3); border-radius: 6px; height: 6px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.4s; }
  .progress-text { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
</style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>

<nav>
  <a href="index.html" class="nav-logo">StudyFlow</a>
  <a href="app.html" class="nav-link">Dashboard</a>
  <a href="timer.html" class="nav-link">⏱ Timer</a>
  <a href="flashcards.html" class="nav-link">🃏 Flashcards</a>
  <a href="todos.html" class="nav-link active">✅ Todos</a>
  <a href="subjects.html" class="nav-link">📁 Subjects</a>
  <a href="progress.html" class="nav-link">🔥 Progress</a>
  <div class="nav-spacer"></div>
  <div id="sf-auth-slot"></div>
  <a href="reteacher.html" class="nav-premium">✨ ReTeacher</a>
</nav>

<div class="page">
  <h1 class="page-title">Homework tracker</h1>
  <p class="page-sub">Track every assignment. Never miss a deadline.</p>

  <div class="add-bar">
    <input type="text" id="task-input" placeholder="Assignment name..." style="flex:2">
    <input type="text" id="subject-input" placeholder="Subject">
    <input type="date" id="due-input">
    <select id="prio-input">
      <option value="med">Medium priority</option>
      <option value="high">High priority</option>
      <option value="low">Low priority</option>
    </select>
    <button class="btn btn-primary" id="add-btn">+ Add</button>
  </div>

  <div id="progress-section">
    <p class="progress-text" id="progress-text"></p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="done">Completed</button>
    <button class="filter-btn" data-filter="high">High priority</button>
    <button class="filter-btn" data-filter="overdue">Overdue</button>
  </div>

  <div id="todo-list"></div>
</div>

<script>
let todos = [];
let filter = 'all';

async function initTodos() {
  todos = await sfLoad('todos', []);
  render();
}

async function saveTodos() { await sfSave('todos', todos); }

function getDueClass(due) {
  if (!due) return '';
  const d = new Date(due + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((d - now) / 86400000);
  if (diff < 0) return 'due-late';
  if (diff <= 2) return 'due-soon';
  return 'due-ok';
}

function getDueLabel(due) {
  if (!due) return '';
  const d = new Date(due + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((d - now) / 86400000);
  if (diff < 0) return 'Overdue';
  if (diff === 0) return 'Due today';
  if (diff === 1) return 'Due tomorrow';
  return 'Due ' + d.toLocaleDateString('en-CA');
}

function render() {
  const today = new Date(); today.setHours(0,0,0,0);
  let filtered = todos;
  if (filter === 'pending') filtered = todos.filter(t => !t.done);
  else if (filter === 'done') filtered = todos.filter(t => t.done);
  else if (filter === 'high') filtered = todos.filter(t => t.prio === 'high' && !t.done);
  else if (filter === 'overdue') filtered = todos.filter(t => t.due && new Date(t.due + 'T00:00:00') < today && !t.done);

  const el = document.getElementById('todo-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div style="font-size:28px">✅</div><p>' + (filter === 'done' ? 'Nothing completed yet' : 'No tasks here') + '</p></div>';
  } else {
    const sorted = [...filtered].sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      const prioVal = { high: 0, med: 1, low: 2 };
      return (prioVal[a.prio] || 1) - (prioVal[b.prio] || 1);
    });
    el.innerHTML = sorted.map(t => {
      const dueClass = getDueClass(t.due);
      const dueLabel = getDueLabel(t.due);
      return `<div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
        <div class="prio-dot prio-${t.prio || 'med'}"></div>
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo('${t.id}')">
        <div class="todo-text-wrap">
          <div class="todo-main">${t.text}</div>
          <div class="todo-meta">
            ${t.subject ? `<span class="todo-subj">${t.subject}</span>` : ''}
            ${dueLabel ? `<span class="due-badge ${dueClass}">${dueLabel}</span>` : ''}
          </div>
        </div>
        <div class="todo-actions">
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteTodo('${t.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = total ? `${done} of ${total} tasks complete (${pct}%)` : 'No tasks yet';
}

async function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; await saveTodos(); render(); }
}

async function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  await saveTodos(); render();
}

document.getElementById('add-btn').addEventListener('click', async () => {
  const text = document.getElementById('task-input').value.trim();
  if (!text) return;
  todos.push({
    id: Date.now().toString(),
    text,
    subject: document.getElementById('subject-input').value.trim(),
    due: document.getElementById('due-input').value,
    prio: document.getElementById('prio-input').value,
    done: false
  });
  await saveTodos(); render();
  document.getElementById('task-input').value = '';
  document.getElementById('subject-input').value = '';
  document.getElementById('due-input').value = '';
});

document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-btn').click(); });

document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
  filter = b.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  render();
}));

sfOnAuthReady(() => initTodos());
initTodos();
</script>
</body>
</html>
